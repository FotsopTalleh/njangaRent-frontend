<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>You are offline — NjangaRent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
      background: #F8F7F2;
      color: #1A1A1A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
    }
    .logo-mark {
      width: 48px;
      height: 48px;
      background: #1B4332;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-text {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1B4332;
      letter-spacing: -0.025em;
    }
    .offline-icon {
      width: 80px;
      height: 80px;
      background: #E2E0DA;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1A1A1A;
      margin-bottom: 0.75rem;
    }
    p {
      font-size: 1rem;
      color: #5C5C5C;
      max-width: 340px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    button {
      background: #1B4332;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.75rem 1.75rem;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <div class="logo">
    <div class="logo-mark">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#F4A261" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <span class="logo-text">NjangaRent</span>
  </div>

  <div class="offline-icon">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#5C5C5C" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
  </div>

  <h1>You are offline</h1>
  <p>Check your connection and try again. NjangaRent needs internet access to show listings and send messages.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
